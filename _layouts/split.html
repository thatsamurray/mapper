<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}" dir="ltr">

  {%- include head.html -%}

    {% if page.url == "/" %}
      <!-- Announcement -->
      <div class="bg-gray-900 text-center p-4">
        <p class="text-sm text-white"><a class="hover:text-indigo-900 focus:text-indigo-900" href="#">🎉 <span class="pl-2 font-semibold">Good news!</span> We've recently added Halton!</a></p>
      </div>

    {% else %}

    {% endif %}

    {%- include masthead.html -%}              
    
    <section class="bg-indigo-900">
    <div class="flex flex-col items-center h-screen max-w-screen-2xl px-12 py-12 mx-auto md:px-8 bg-indigo-900 md:flex-row ">
        <div class="relative hidden w-full h-screen lg:block md:w-1/3 xl:w-1/3">
            <header class="w-full my-20 text-center"> 
                <h1 class="mb-2 text-3xl text-center text-white font-semibold md:text-5xl lg:text-left lg:text-4xl xl:text-5xl">{{ page.title }}</h1>
            </header>
        </div>
        <div class="flex w-full h-screen bg-blue-1300 md:max-w-md lg:max-w-full md:mx-auto md:w-1/2 xl:w-2/3 items-left justify-left">
            <article class="w-full">
                {{ content }}
            </article>
        </div>

    </section>   

    {%- include footer.html -%}

    {%- include scripts.html -%}

  </body>
</html>
