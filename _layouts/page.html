---
layout: default
---

<section>
  <div class="max-w-screen-md px-4 md:px-8 my-8 md:my-12 mx-auto">
    <article class="post">
      <header class="post-header">
        <h1 class="text-xl sm:text-2xl md:text-3xl lg:text-5xl">
          <span>{{ page.title | escape }}</span>
        </h1>
      </header>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </div>
</section>
