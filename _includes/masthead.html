<!-- Masterhead -->
  <header class="w-full py-4 md:py-4 text-white bg-indigo-900">
    <div x-data="{ open: false }" class="flex flex-col max-w-screen-2xl px-4 mx-auto md:items-center md:justify-between md:flex-row md:px-8">
      <div class="py-2 flex flex-row items-center justify-between">
        <!-- Logo -->
        <a href="{{ "/" | relative_url }}" class="text-lg md:text-2xl text-purple-100 rounded-lg focus:outline-none focus:shadow-outline">‍health<span class="font-bold">mapper</span></a>
        <button class="md:hidden rounded-lg focus:outline-none focus:shadow-outline" @click="open = !open">
          <svg fill="currentColor" viewBox="0 0 20 20" class="w-6 h-6">
            <path x-show="!open" fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM9 15a1 1 0 011-1h6a1 1 0 110 2h-6a1 1 0 01-1-1z" clip-rule="evenodd"></path>
            <path x-show="open" fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
          </svg>
        </button>
      </div>
  
      <!-- Navigation -->
      <nav :class="{'flex': open, 'hidden': !open}" class="flex-col flex-grow pb-4 md:pb-0 hidden md:flex md:justify-end md:flex-row">
        <div @click.away="open = false" class="relative" x-data="{ open: false }">
          <button @click="open = !open" class="flex flex-row items-center w-full px-2 py-2 mt-2 md:text-md font-semibold text-left bg-transparent rounded-lg md:w-auto md:inline md:mt-0 md:ml-4 hover:text-white focus:text-white hover:bg-indigo-800 focus:bg-indigo-800 focus:outline-none focus:shadow-outline">
            <span>Browse Places</span>
            <svg fill="currentColor" viewBox="0 0 20 20" :class="{'rotate-180': open, 'rotate-0': !open}" class="inline w-4 h-4 mt-1 ml-1 transition-transform duration-200 transform md:-mt-1"><path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd"></path></svg>
          </button>
          <div x-show="open" x-transition:enter="transition ease-out duration-100" x-transition:enter-start="transform opacity-0 scale-95" x-transition:enter-end="transform opacity-100 scale-100" x-transition:leave="transition ease-in duration-75" x-transition:leave-start="transform opacity-100 scale-100" x-transition:leave-end="transform opacity-0 scale-95" class="absolute right-0 w-full mt-2 origin-top-right rounded-md shadow-lg md:w-80">
            <div class="px-2 py-2 bg-white rounded-md shadow">
              <a class="flex flex row items-center rounded-lg bg-transparent p-2 font-semibold text-purple-700 hover:text-purple-600 focus:text-purple-600 hover:bg-purple-200 focus:bg-purple-200 focus:outline-none focus:shadow-outline" href="{{ "/places/merseyside" | relative_url }}">
                Merseyside
              </a>
              <a class="flex flex row items-center rounded-md bg-purple-50 p-2 font-semibold text-purple-700 hover:text-purple-900 focus:text-purple-900 hover:bg-purple-200 focus:bg-purple-200 focus:outline-none focus:shadow-outline" href="{{ "/places/cheshire" | relative_url }}">
                Cheshire
              </a>
            </div>
          </div>
        </div>
        <a class="px-2 py-2 mt-2 md:text-md font-semibold bg-transparent rounded-lg md:mt-0 md:ml-4 hover:text-white focus:text-white hover:bg-indigo-800 focus:bg-indigo-800 focus:outline-none focus:shadow-outline" href="{{ "/resources/" | relative_url }}">Resources</a>
        <a class="flex flex-row items-center w-full px-2 py-2 mt-2 md:text-md font-semibold text-left bg-transparent text-red-300 rounded-lg md:w-auto md:inline md:mt-0 md:ml-4 hover:text-red-300 focus:text-red-300 hover:bg-indigo-800 focus:bg-indigo-800 focus:outline-none focus:shadow-outline" href="{{ "/crisis/" | relative_url }}">Crisis Information</a>
      </nav>
    </div>
  </header>
